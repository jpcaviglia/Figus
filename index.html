<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Figus San Cristobal</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://unpkg.com/lucide@latest"></script>
   <!-- Open Graph (WhatsApp, Facebook, etc.) -->
   <meta property="og:title" content="Planeta Figus - Catálogo" />
   <meta property="og:description" content="Figuritas, álbumes y más. Pedinos fácil por WhatsApp." />
   <meta property="og:image" content="content/img/album_pokemonMegaevolucion.webp" />
   <meta property="og:url" content="https://www.figussancristobal.com.ar" />
   <meta property="og:type" content="website" />
   <link rel="icon" type="image/webp" href="content/img/sobres_tocaLife.webp">
</head>
<div id="viewer"
     class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition">

   <img id="viewerImg"
        class="max-w-[90%] max-h-[85%] rounded-2xl shadow-2xl scale-95 transition" />

</div>
<body class="bg-gradient-to-br from-slate-100 via-gray-100 to-slate-200 text-gray-800">

   <!-- HEADER -->
   <header class="sticky top-0 z-20 backdrop-blur-md bg-white/60 border-b border-white/40 shadow-sm">
      <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">

         <!-- LEFT -->
         <div class="flex items-center gap-3">
            <img src="content/img/cards.png" class="w-8 h-8 object-contain" />
            <div>
               <h1 class="text-lg font-semibold leading-none">Planeta Figus</h1>
               <span class="text-xs text-gray-500">Almagro, Ciudad Autonoma de Buenos Aires</span>
            </div>
         </div>

         <!-- RIGHT -->
         <div class="flex items-center gap-3">

            <!-- SEARCH -->
            <input id="search"
                   placeholder="Buscar..."
                   class="hidden sm:block p-2 px-3 rounded-full border shadow-sm focus:ring-2 focus:ring-black outline-none text-sm" />

            <!-- WhatsApp -->
            <button onclick="scrollToContact()"
                    class="p-2 rounded-full hover:bg-gray-200 transition flex items-center gap-1 text-sm">
               <i data-lucide="phone"></i>
               Contacto
            </button>

            <!-- Cart -->
            <div id="floatingCart"
                 class="hidden relative cursor-pointer p-2 rounded-full hover:bg-gray-200 transition">
               <i data-lucide="shopping-cart"></i>
               <span id="cartCount"
                     class="absolute -top-1 -right-1 bg-black text-white text-xs px-1.5 rounded-full"></span>
            </div>

         </div>
      </div>
   </header>
   <section class="max-w-6xl mx-auto px-4 pt-8 pb-6">

      <!-- TITLE -->
      <div class="mb-6">
         <h2 class="text-3xl font-semibold tracking-tight">Figus San Cristóbal</h2>
         <p class="text-gray-600 mt-1">Almagro, Ciudad Autónoma de Buenos Aires</p>
      </div>

      <!-- CAROUSEL -->
      <div class="relative overflow-hidden rounded-3xl">
         <div id="carousel" class="flex transition-transform duration-500">
            <!-- slides injected by JS -->
         </div>

         <!-- controls -->
         <button onclick="prevSlide()"
                 class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/70 backdrop-blur p-2 rounded-full shadow">
            ‹
         </button>

         <button onclick="nextSlide()"
                 class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/70 backdrop-blur p-2 rounded-full shadow">
            ›
         </button>
      </div>

      <!-- CTA -->
      <div class="mt-6">
         <a href="https://wa.me/1165532173?text=Hola,%20quiero%20consultar%20sobre%20figuritas"
            target="_blank"
            class="inline-block bg-green-500 text-white px-6 py-3 rounded-full shadow hover:bg-green-600 transition">
            Contactanos por WhatsApp
         </a>
      </div>

   </section>


   <!-- GRID -->
   <div id="products" class="max-w-6xl mx-auto mb-10 p-4 grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
   <section id="contacto" class="max-w-6xl mx-auto px-4 py-12">

      <h2 class="text-2xl font-semibold mb-6">Contacto</h2>

      <div class="bg-white rounded-3xl p-6 shadow-sm space-y-4">

         <!-- Phone -->
         <div>
            <div class="text-sm text-gray-500">Teléfono</div>
            <div class="font-medium">+54 11 6553-2173</div>
         </div>

         <!-- WhatsApp -->
         <div>
            <div class="text-sm text-gray-500">WhatsApp</div>
            <a href="https://wa.me/1165532173?text=Hola,%20tenia%20una%20consulta%20sobre%20las%20figuritas"
               target="_blank"
               class="text-green-600 hover:underline">
               Enviar mensaje
            </a>
         </div>

         <!-- Email -->
         <div>
            <div class="text-sm text-gray-500">Email</div>
            <a href="mailto:figussancristobal@gmail.com"
               class="text-blue-600 hover:underline">
               figussancristobal@gmail.com
            </a>
         </div>

         <!-- Maps -->
         <div>
            <div class="text-sm text-gray-500 mb-2">Ubicación</div>

            <a href="https://www.google.com/maps?q=-34.604578,-58.407191"
               target="_blank"
               class="block rounded-2xl overflow-hidden group shadow-sm relative">

               <!-- IMAGE -->
               <img src="content/img/location.png"
                    class="w-full h-44 object-cover group-hover:scale-105 transition duration-300" />

               <!-- PIN ICON (this is step 4) -->
               <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                  <div class="bg-white/80 backdrop-blur p-2 rounded-full shadow">
                     <i data-lucide="map-pin"></i>
                  </div>
               </div>

               <!-- LABEL -->
               <div class="absolute bottom-0 left-0 right-0 bg-black/40 text-white text-sm px-3 py-2">
                  Ver en Google Maps
               </div>

            </a>
         </div>

      </div>

   </section>
   <!-- TOAST -->
   <div id="toast"
        class="fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-3 bg-black text-white px-5 py-2 rounded-full opacity-0 transition-all duration-300">
   </div>

   <!-- CART -->
   <div id="cartPanel" class="fixed right-0 top-0 w-full sm:w-96 h-full bg-white shadow-2xl p-4 z-30 flex flex-col transition-transform duration-300 translate-x-full">
      <div class="flex justify-between items-center mb-4">
         <h2 class="text-lg font-semibold">Carrito</h2>
         <button id="closeCart" class="p-1 hover:bg-gray-200 rounded"><i data-lucide="x"></i></button>
      </div>

      <div id="cartItems" class="flex-1 overflow-y-auto space-y-4"></div>

      <div id="cartTotal" class="font-semibold mt-4 text-lg"></div>
      <button id="checkoutBtn" class="mt-3 bg-green-500 text-white py-3 rounded-xl hover:bg-green-600 transition">Enviar por WhatsApp</button>
   </div>

   <script src="content/js/main.js?v=1.0">

   </script>

</body>
</html>
