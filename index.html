<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Catálogo Trading Cards</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="styles/styles.css" />
</head>
<body class="text-gray-900 font-sans bg-gradient-to-br from-orange-50 to-yellow-100">

	<!-- Header -->
	<header class="p-4 bg-gradient-to-r from-orange-500 to-red-500 text-white shadow-md sticky top-0 z-20">
		<div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
			<h1 class="text-3xl font-extrabold tracking-tight">🔥 El mejor lugar de Figus Ever</h1>
			<div class="flex flex-col sm:flex-row gap-2 w-full sm:w-auto">
				<input type="text"
						 id="searchInput"
						 placeholder="Buscar productos..."
						 class="w-full sm:w-72 px-4 py-2 border border-orange-300 rounded-md focus:outline-none focus:ring-2 focus:ring-orange-400" />
				<select id="brandFilter"
						  class="px-4 py-2 border border-orange-300 rounded-md bg-white text-gray-800">
					<option value="">Todas las marcas</option>
				</select>
			</div>
		</div>
	</header>

	<!-- Main content + Cart container -->
	<div class="max-w-6xl mx-auto flex relative pt-6 px-4 md:px-0">

		<!-- Catalog grid -->
		<main id="catalog"
				class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 flex-grow pr-0 md:pr-96">
			<!-- Products injected here -->
		</main>

		<!-- Cart Sidebar (desktop) -->
		<aside id="cartSidebar"
				 class="hidden md:flex flex-col fixed top-0 right-0 h-full w-80 bg-white shadow-lg border-l-4 border-orange-400 p-6 overflow-y-auto z-30">
			<h2 class="text-2xl font-bold mb-4 text-orange-600">🛒 Tu Pedido</h2>
			<div id="cartItems" class="space-y-2 flex-grow overflow-auto"></div>
			<p class="mt-4 font-bold text-lg">
				Total: <span id="cartTotal" class="text-green-600">$0</span>
			</p>
			<a id="whatsappButton"
				href="#"
				target="_blank"
				class="inline-block mt-4 px-6 py-2 bg-green-500 text-white font-semibold rounded hover:bg-green-600 transition text-center">📲 Pedir por WhatsApp</a>
		</aside>
	</div>

	<!-- Floating Cart Button (mobile) -->
	<button id="cartToggleBtn"
			  class="fixed bottom-6 right-6 bg-orange-500 text-white p-4 rounded-full shadow-lg text-2xl z-40 md:hidden"
			  aria-label="Abrir carrito"
			  title="Abrir carrito">
		🛒
	</button>

	<!-- Mobile Cart Panel -->
	<div id="mobileCartPanel"
		  class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t-4 border-orange-400 p-4 z-50 transform translate-y-full transition-transform duration-300 md:hidden">
		<div class="flex justify-between items-center mb-3">
			<h2 class="text-xl font-bold text-orange-600">🛒 Tu Pedido</h2>
			<button id="mobileCartCloseBtn"
					  aria-label="Cerrar carrito"
					  class="text-gray-600 hover:text-gray-900 text-2xl font-bold">
				×
			</button>
		</div>
		<div id="mobileCartItems" class="space-y-2 max-h-48 overflow-y-auto"></div>
		<p class="mt-3 font-bold text-lg">
			Total: <span id="mobileCartTotal" class="text-green-600">$0</span>
		</p>
		<a id="mobileWhatsappButton"
			href="#"
			target="_blank"
			class="block mt-4 w-full px-6 py-2 bg-green-500 text-white font-semibold rounded hover:bg-green-600 text-center">📲 Pedir por WhatsApp</a>
	</div>
	<section class="max-w-6xl mx-auto mt-12 p-6 bg-orange-50 rounded-lg shadow-md text-center text-gray-700">
		<h2 class="text-2xl font-bold mb-4 text-orange-600">📞 Contacto</h2>
		<p class="mb-2">Teléfono: <a href="tel:+XXXXXXXX" class="text-orange-500 hover:underline">+54 9 11 1234-5678</a></p>
		<p class="mb-2">Email: <a href="mailto:ventas@tradingcards.com" class="text-orange-500 hover:underline">ventas@zzzzzz</a></p>
		<p>Dirección: Calle Falsa 123, Ciudad, País</p>
		<div class="mt-6 w-full h-64 rounded-lg overflow-hidden shadow-md">
			<iframe src="https://maps.google.com/maps?q=-34.610091,-58.404674&z=15&output=embed"
					  width="100%"
					  height="100%"
					  frameborder="0"
					  style="border:0"
					  allowfullscreen=""
					  aria-hidden="false"
					  tabindex="0"
					  loading="lazy"></iframe>
		</div>
	</section>
	<script src="js/products.js"></script>
	<script src="js/main.js"></script>
</body>
</html>
