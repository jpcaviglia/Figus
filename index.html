<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>Catálogo</title>
   <style>
      /* Base layout */
      body {
         font-family: system-ui;
         margin: 0;
         background: #f4f6f8;
      }

      header {
         background: #111;
         color: #fff;
         padding: 16px;
         text-align: center;
         font-weight: 600;
      }

      /* Filters */
      .controls {
         padding: 10px;
         display: flex;
         flex-wrap: wrap;
         gap: 10px;
         background: white;
         position: sticky;
         top: 0;
         z-index: 2;
      }

         .controls input, .controls select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
         }

      /* Grid */
      .container {
         display: grid;
         gap: 16px;
         padding: 16px;
      }

      @media(min-width:600px) {
         .container {
            grid-template-columns: repeat(2,1fr)
         }
      }

      @media(min-width:1000px) {
         .container {
            grid-template-columns: repeat(3,1fr)
         }
      }

      /* Product card */
      .card {
         background: white;
         border-radius: 14px;
         padding: 12px;
         box-shadow: 0 6px 16px rgba(0,0,0,.08)
      }

         .card img {
            width: 100%;
            border-radius: 10px
         }


      h3 {
         margin: 6px 0
      }

      .price {
         font-weight: bold
      }

      .sub {
         font-size: 13px;
         color: #555
      }

      /* Quantity controls */
      .qty {
         display: flex;
         gap: 6px;
         margin-top: 8px;
         align-items: center
      }

         .qty input {
            width: 50px;
            text-align: center;
            padding: 4px
         }

      button {
         padding: 8px;
         border: none;
         border-radius: 8px;
         background: #111;
         color: #fff;
         cursor: pointer
      }

         button:hover {
            background: #333
         }

      /* Floating cart button */
      .floating-cart {
         position: fixed;
         bottom: 20px;
         right: 20px;
         background: #111;
         color: white;
         border-radius: 50%;
         width: 60px;
         height: 60px;
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 22px;
         cursor: pointer;
         z-index: 10; /* ← FIX */
      }

      .hidden {
         display: none
      }

      /* Cart panel */
      .cart-panel {
         position: fixed;
         right: 0;
         top: 0;
         width: 320px;
         height: 100%;
         background: white;
         box-shadow: -4px 0 16px rgba(0,0,0,0.1);
         padding: 16px;
         overflow-y: auto;
         z-index: 20;
      }

      .cart-header {
         display: flex;
         justify-content: space-between;
         align-items: center
      }

      .cart-item {
         display: flex;
         gap: 10px;
         margin-bottom: 12px;
         align-items: center
      }

         .cart-item img {
            width: 50px;
            height: 50px;
            border-radius: 8px
         }

      .cart-item-info {
         flex: 1;
         font-size: 13px
      }

      .cart-item-controls input {
         width: 50px
      }

      .checkout-btn {
         width: 100%;
         background: #25D366;
         margin-top: 10px
      }
   </style>
</head>
<body>

   <header>Catálogo</header>

   <!-- Filters -->
   <div class="controls">
      <input type="text" id="search" placeholder="Buscar...">
      <select id="type">
         <option value="">Tipo</option>
         <option value="Sobres">Sobres</option>
         <option value="Album">Album</option>
      </select>
   </div>

   <!-- Product grid -->
   <div class="container" id="products"></div>

   <!-- Floating cart trigger -->
   <div id="floatingCart" class="floating-cart hidden">🛒</div>

   <!-- Cart panel -->
   <div id="cartPanel" class="cart-panel hidden">
      <div class="cart-header">
         <h3>Carrito</h3>
         <button id="closeCart">✕</button>
      </div>
      <div id="cartItems"></div>
      <div id="cartTotal"></div>
      <button class="checkout-btn" id="checkoutBtn">Enviar por WhatsApp</button>
   </div>
   <script>
      const products = [
         { id: 1, img:"img/sobres_guerreras.webp", name: "Guerreras Kpop Sobres", price: 769, pack: 667, retail: 1000 },
         { id: 2, img:"img/album_guerreras.webp", name: "Guerreras Kpop Album", price: 4615, pack: 3500, retail: 6000 },
         { id: 3, img:"img/sobres_adrenalynMundial.webp", name: "Adrenalyn Mundial", price: 2692, pack: 2163, retail: 3500 },
         { id: 4, img:"img/sobres_tocaLife.webp",  name: "Toca Life Sobres", price: 769, pack: 667, retail: 1000 },
         { id: 5, img:"img/album_tocaLife.webp",  name: "Toca Life Album", price: 3846, pack: 3500, retail: 5000 },
         { id: 6, img:"img/sobres_pokemonMegaevolucion.webp",  name: "Pokemon Sobres", price: 769, pack: 667, retail: 1000 },
         { id: 7, img:"img/album_pokemonMegaevolucion.webp",  name: "Pokemon Album", price: 3846, pack: 3500, retail: 5000 },
         { id: 8, img:"img/sobres_bts.webp", name: "BTS Sobres", price: 962, pack: 780, retail: 1250 },
         { id: 9, img:"img/album_bts.webp", name: "BTS Album", price: 5385, pack: 4200, retail: 7000 },
         { id: 10,img:"img/sobres_zootopia2.webp", name: "Zootopia Sobres", price: 1154, pack: 980, retail: 1500 },
         { id: 11,img:"img/album_zootopia2.webp", name: "Zootopia Album", price: 6538, pack: 5650, retail: 8500 }
      ];

      let cart = {};

      const $ = id => document.getElementById(id);

      function format(n) {
         return "$" + n.toLocaleString("es-AR");
      }

      function getQty(id) {
         return cart[id]?.qty || 0;
      }

      function setQty(id, val) {
         const qty = Math.max(0, parseInt(val, 10) || 0);
         const product = products.find(p => p.id === id);
         if (!product) return;

         if (qty === 0) delete cart[id];
         else cart[id] = { qty, product };

         updateUI();
      }

      /* ---------- PRODUCTS ---------- */

      function renderProducts() {
         const container = $("products");
         container.innerHTML = "";

         const search = $("search").value.toLowerCase();
         const type = $("type").value;

         const filtered = products
            .filter(p => p.name.toLowerCase().includes(search))
            .filter(p => !type || p.name.includes(type));

         filtered.forEach(p => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
         <img src="${p.img}">
         <h3>${p.name}</h3>
         <div class="price">${format(p.price)}</div>
         <div class="sub">Costo: ${format(p.pack)}</div>
         <div class="sub">Precio sugerido al público: ${format(p.retail)}</div>
         <div class="qty">
           <button data-id="${p.id}" data-delta="-1">-</button>
           <input type="number" min="0" value="${getQty(p.id)}" data-input="${p.id}">
           <button data-id="${p.id}" data-delta="1">+</button>
         </div>
       `;

            container.appendChild(div);
         });
      }

      /* ---------- CART ---------- */

      function renderCart() {
         const list = $("cartItems");
         list.innerHTML = "";

         let total = 0;
         let count = 0;

         Object.values(cart).forEach(item => {
            total += item.qty * item.product.price;
            count += item.qty;

            const row = document.createElement("div");
            row.className = "cart-item";

            row.innerHTML = `
         <img src="https://via.placeholder.com/50">
         <div class="cart-item-info">
           <div>${item.product.name}</div>
           <div>${format(item.qty * item.product.price)}</div>
         </div>
         <input type="number" min="0" value="${item.qty}" data-cart-input="${item.product.id}">
       `;

            list.appendChild(row);
         });

         $("cartTotal").textContent = `Total: ${format(total)}`;
         $("floatingCart").classList.toggle("hidden", count === 0);
      }

      /* ---------- UI SYNC ---------- */

      function updateUI() {
         updateFloatingCart();

         if (!$("cartPanel").classList.contains("hidden")) {
            renderCart();
         }

         syncInputs(); // keep product inputs in sync WITHOUT re-render
      }

      function updateFloatingCart() {
         const count = Object.values(cart).reduce((a, b) => a + b.qty, 0);
         $("floatingCart").classList.toggle("hidden", count === 0);
      }

      function syncInputs() {
         document.querySelectorAll("[data-input]").forEach(input => {
            const id = Number(input.dataset.input);
            input.value = getQty(id);
         });
      }
      /* ---------- EVENTS ---------- */

      document.addEventListener("click", e => {

         // +/- buttons
         if (e.target.dataset.id) {
            const id = Number(e.target.dataset.id);
            const delta = Number(e.target.dataset.delta);
            setQty(id, getQty(id) + delta);
         }
         if (e.target.closest("#floatingCart")) {
            const panel = $("cartPanel");

            panel.classList.remove("hidden");

            // 🔥 HARD RESET + RENDER FROM STATE
            const list = $("cartItems");
            list.innerHTML = "";

            let total = 0;

            Object.values(cart).forEach(item => {
               total += item.qty * item.product.price;

               const row = document.createElement("div");
               row.className = "cart-item";

               row.innerHTML = `
      <img src="https://via.placeholder.com/50">
      <div class="cart-item-info">
        <div>${item.product.name}</div>
        <div>${format(item.qty * item.product.price)}</div>
      </div>
      <input type="number" min="0" value="${item.qty}">
    `;

               list.appendChild(row);
            });

            $("cartTotal").textContent = `Total: ${format(total)}`;
         }

         // close cart
         if (e.target.id === "closeCart") {
            $("cartPanel").classList.add("hidden");
         }
      });

      /* ONLY change (no input spam) */
      document.addEventListener("change", e => {
         if (e.target.dataset.input) {
            setQty(Number(e.target.dataset.input), e.target.value);
         }

         if (e.target.dataset.cartInput) {
            setQty(Number(e.target.dataset.cartInput), e.target.value);
         }
      });

      /* filters */
      $("search").oninput = renderProducts;
      $("type").onchange = renderProducts;

      /* checkout */
      $("checkoutBtn").onclick = () => {
         let msg = "Pedido:%0A%0A";
         let total = 0;

         Object.values(cart).forEach(item => {
            msg += `${item.product.name} x${item.qty} - ${format(item.qty * item.product.price)}%0A`;
            total += item.qty * item.product.price;
         });

         msg += `%0ATotal: ${format(total)}`;
         window.open(`https://wa.me/1165532173?text=${msg}`, "_blank");
      };

      /* init */
      renderProducts();
   </script>
</body>
</html>
